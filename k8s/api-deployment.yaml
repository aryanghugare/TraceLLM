apiVersion: apps/v1
kind: Deployment
metadata:
  name: trace-llm-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trace-llm-api
  template:
    metadata:
      labels:
        app: trace-llm-api
    spec:
      containers:
        - name: api
          image: trace-llm-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: trace-llm-config
            - secretRef:
                name: trace-llm-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
